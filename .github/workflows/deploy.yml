name: Deploy to Dokku

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Load private key safely
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Trust server host key
          ssh-keyscan -H "${{ secrets.DOKKU_HOST }}" >> ~/.ssh/known_hosts

      - name: Add Dokku remote
        run: |
          git remote add dokku "ssh://${{ secrets.DOKKU_SSH_USER }}@${{ secrets.DOKKU_HOST }}/${{ secrets.DOKKU_APP }}" || true

      - name: Deploy to Dokku
        run: |
          git push dokku HEAD:main --force